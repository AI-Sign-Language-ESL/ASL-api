# ===============================
# HTTP → HTTPS Redirect
# ===============================
server {
    listen 80;
    server_name api.tafahom.io;

    return 301 https://$host$request_uri;
}

# ===============================
# HTTPS Server
# ===============================
server {
    listen 443 ssl;
    server_name api.tafahom.io;

    ssl_certificate /etc/letsencrypt/live/api.tafahom.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tafahom.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # ===============================
    # PGADMIN (WORKS WITH SUBPATH)
    # ===============================
    location /pgadmin/ {
        proxy_pass http://127.0.0.1:5050/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===============================
    # STATIC FILES
    # ===============================
    location /static/ {
        alias /root/ASL-api/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ===============================
    # MEDIA FILES
    # ===============================
    location /media/ {
        alias /root/ASL-api/media/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Accept-Ranges bytes;
    }

    # ===============================
    # WEBSOCKETS (Daphne)
    # ===============================
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ===============================
    # DJANGO BACKEND
    # ===============================
    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;   # 🔥 critical
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}