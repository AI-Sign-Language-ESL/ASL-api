# ===============================
# HTTP → HTTPS Redirect
# ===============================
server {
    listen 80;
    server_name tafahom.io www.tafahom.io;

    return 301 https://$host$request_uri;
}

# ===============================
# HTTPS Server
# ===============================
server {
    listen 443 ssl;
    server_name tafahom.io www.tafahom.io;

    # ✅ SSL (Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Optional (recommended SSL settings)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 5M;

    # ===============================
    # Static Files
    # ===============================
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ===============================
    # Media Files
    # ===============================
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ===============================
    # WebSocket (IMPORTANT)
    # ===============================
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ===============================
    # Security: Block Bot Scanners
    # ===============================
    # Block hidden files & backups
    location ~* (/\.ht|/\.git|/\.env|/\.svn|\.bak|\.zip|\.tar|\.tar\.gz|\.sql|\.old|\.log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block WordPress-specific path scans
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-login\.php|xmlrpc\.php) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common admin panel scans (PHPMyAdmin, cPanel, etc)
    location ~* ^/(phpmyadmin|cpanel|administrator|joomla|drupal|magento) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===============================
    # Backend (Django)
    # ===============================
    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
