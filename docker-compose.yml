version: "3.9"

services:
  # =========================
  # Backend (Django + Daphne)
  # =========================
  backend:
    container_name: tafahom-backend
    build:
      context: .
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: tafahom_api.settings
      ENVIRONMENT: PROD
    command: >
      sh -c " python manage.py migrate && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 tafahom_api.asgi:application "
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000" # ✅ IMPORTANT (host nginx will use this)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:17-alpine
    container_name: tafahom-postgres
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================
  # Redis (Channels)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: tafahom-redis
    restart: unless-stopped

  # =========================
  # pgAdmin (Optional UI)
  # =========================
  pgadmin:
    image: dpage/pgadmin4
    container_name: tafahom-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tafahom.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      SCRIPT_NAME: /pgadmin
    ports:
      - "5050:80" # access via http://server-ip:5050
    depends_on:
      - postgres
    restart: unless-stopped

# =========================
# Volumes
# =========================
volumes:
  postgres_data:
  static_volume:
  media_volume:
