# Coturn TURN Server Configuration for TAFAHOM

# Network settings
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# Listen on all interfaces
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# External/Public IP (IMPORTANT: Replace with your actual public IP)
external-ip=72.62.145.111

# Authentication
lt-cred-mech
user=tafahom_admin:StrongPassword123

# Realm (domain)
realm=tafahom.com

# TLS settings (generate certificates or disable for testing)
# Uncomment these lines if you have certificates:
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/key.pem

# For testing without TLS (NOT recommended for production)
no-tls
no-dtls

# Port range for relay
min-port=49152
max-port=65535

# Security
no-cli
no-loopback-peers
no-multicast-peers

# Logging
log-file=stdout
verbose
